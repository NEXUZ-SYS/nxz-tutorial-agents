      - section: "4. Etapa S2 — Qualificação 100% humana: Checklist Binário + BANT/SPIN + cadência"
        purpose: "Roteiro de qualificação (perguntas por item do Checklist Binário: fit, faturamento, dor, unidades, decisor, urgência). Amarração com BANT e SPIN (situação/problema/implicação/necessidade). Cadência 4 toques em 8d. Templates ET-01/02/03 do Pipefy. Critério de avanço: Checklist 6/6 = SAL."
        priority: alta
        content_sources: [PDD §5 R5-R7, §5A Checklist Binário, §6.1, specs/07-email-templates.json ET-01/02/03]

      - section: "5. Etapa S3 + S4 — Demo (QS vs FS) e Pós-demo: roteiro + aceite verbal"
        purpose: "Roteiro de demo segmentado: QS simplificada (15 min, wow moments), FS consultiva (30 min, diagnóstico). Wow moments canônicos do NXZ Go Sales v1.0. Como obter aceite verbal (gate absoluto F-Proposta). Como registrar no Pipefy (Status demo, Aceite verbal, Dor confirmada)."
        priority: alta
        content_sources: [PDD §5 R8-R10, §5A F-Demo e F-Proposta, §6 cadência, NXZ Go Sales Operacional §7, pipe-design §3.4 P3/P4]

      - section: "6. Etapa S5 — Proposta: precificação + cadência + objeções de preço/migração"
        purpose: "Como montar proposta (QS mensagem / FS PDF consultivo). Preço base + margem + desconto (limite de 15% sem escalação, GT-11). Cadência 15d com follow-up ET-04 D+3, alerta D+7, decisão D+15. Banco de objeções de preço/migração/treinamento."
        priority: alta
        content_sources: [PDD §5 R11-R18, §6.2, §15 Precificação, specs/07-email-templates.json ET-04, pipe-design §3.4 P5]

      - section: "7. Etapa S6 + S7 — Fechamento e GANHO: orquestração Ops × Financeiro × Gestão"
        purpose: "Coleta de CNPJ (14 dígitos, unicidade R33). Handoff Ops→Financeiro para boleto (5d SLA). Handoff Ops→Gestão para contrato (3d SLA). Transição automática para GANHO (R19/A-13). Handoff para Implantação."
        priority: alta
        content_sources: [PDD §5 R19, R31-R33, §4 RACI T-14/T-15/T-16/T-17, §5A F-Fechamento e F-GANHO, §16 handoff, pipe-design §3.4 P6/P7]

      - section: "8. Banco de objeções por etapa + respostas (suíte inteira)"
        purpose: "Objeções típicas Food Service: 'já tenho sistema', 'é caro', 'vou perder dados na migração', 'minha equipe não vai aprender', 'e se cair a internet', 'e multi-unidade?', 'só preciso de maquininha', 'quero só o totem', 'tenho contabilidade própria'. Respostas ancoradas em produto + dados reais."
        priority: alta
        content_sources: [NXZ Go Sales §4/§5, NXZ Go Totem §Objeções, NXZ Go PDV §Objeções, NXZ Go Smart POS §Objeções, Produtos v0.2 §diferenciais]

