  recommendations:
    template_structure:
      - section: "1. Visão geral do processo comercial Nexuz"
        purpose: "Fornecer mental model de 1 página: fluxo PDD (S1→S7/S8 + Nutrição), papéis (Ops/Gestão/Financeiro/Relacionamento), marcos POD (Lead/MQL/SAL/Ganho/Live), aterragem no Pipe Pipefy (P1→P8)."
        priority: alta
        content_sources: [PDD §1-§2, PDD §7, pipe-design.md §1-§3]

      - section: "2. ICP e comitê de compra — quem é cliente Nexuz e quem decide"
        purpose: "Critérios objetivos de ICP (QS/FS/Zona/Fora), faixa de faturamento, nº unidades, geografia; mapeamento de personas do comitê (Proprietário=decisor / Gerente=influenciador / Caixa-Garçom=operacional / Gatekeeper)."
        priority: alta
        content_sources: [PDD §3.1, Persona v0.2, Negócios v0.4, Produtos v0.2]

      - section: "3. Etapa S1 — Entrada de leads (Inbound/Outbound/Indicação): script de abertura + Pipefy"
        purpose: "O que fazer em 2h/48h úteis. Script por origem. Campos obrigatórios no Start Form. Como atribuir Ops responsável e vincular Cliente no Pipefy. Feedback ao indicador em até 7 dias."
