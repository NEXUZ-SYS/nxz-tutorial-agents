        purpose: "Como registrar descarte (motivo obrigatório 1/9, campos condicionais). Decisão entre Nutrição e Descarte. Pipe de Nutrição: 2 ciclos de 30d, D+7/D+15 e-mail auto, revisão D+30/D+60, descarte auto D+67. Janela de reengajamento por motivo (3 ou 6 meses)."
