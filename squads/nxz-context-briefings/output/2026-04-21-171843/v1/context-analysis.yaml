analysis:
  product: "Suíte Nexuz (playbook comercial)"
  audience: Sales-Ops
  level: Operacional
  objective: >
    Playbook de vendas (qualificação + fechamento) nível Operacional para o time
    de Sales-Ops da Nexuz (Food Service). Conteúdo de venda agnóstico de ferramenta,
    mas cada etapa aterrada no Pipe Pipefy já configurado, com aderência 1:1 ao PDD
    de vendas canônico (PDD-NXZ-VENDAS-001 v1.0).

  existing_contexts:
    - file: "(v_ 0.4) Briefing de Contexto de Negócios da Nexuz.md"
      version: "0.4"
      coverage:
        audiences: [Estratégico, Vendas, Marketing]
        levels: [Estratégico]
        has_examples: true
        cross_references: [Produtos, Personas]
      relevance_for_playbook: alta
      key_extracts:
        - "Mercado-alvo: Food Service 'To Go' (restaurantes, bares, cafés, food trucks, catering, franquias) + negócios em digitalização."
        - "5 dores canônicas: Comunicação ineficiente, Controle de estoque deficiente, Gestão financeira complexa, Experiência do cliente insatisfatória, Implementação demorada."
        - "Expectativas do ICP: automação, visão unificada, agilidade no atendimento, escalabilidade, suporte especializado FS."
        - "Onde encontrar ICP: LinkedIn, Facebook, eventos do setor FS, site/blog da Nexuz."
        - "Portfólio declarado: NXZ ERP, NXZ Go, NXZ KDS, NXZ Delivery (+ NXZ Pay Go no escopo ampliado)."
      gaps:
        - "Não fala em ICP segmentado QS/FS (aparece no PDD)."
        - "Sem estatísticas de win rate, ciclo, ticket — expressamente ausentes (baselines a calibrar)."

    - file: "(v_ 0.2) Briefing de Contexto de Persona da Nexuz.md"
      version: "0.2"
      coverage:
        audiences: [Sales, Marketing, Product]
        levels: [Operacional]
        has_examples: true
        cross_references: [Negócios, Produtos]
      relevance_for_playbook: alta
      key_extracts:
        - "5 personas do comitê de compra: Cliente Consumidor, Operador de Caixa, Garçom, Gerente de Operação, Proprietário/Decisor."
        - "Proprietário = decisor estratégico (expansão, margem, compliance) — alvo principal da venda."
        - "Gerente de Operação = influenciador chave (dashboards, indicadores, treinamento, onboarding simples)."
        - "Operador/Garçom = usuários finais — preocupação com agilidade, erros, registro digital."
      gaps:
        - "Não mapeia perguntas de descoberta por persona."
        - "Não associa cada persona ao Decisor/Influenciador/Operacional/Gatekeeper do PDD (gap a preencher)."

    - file: "(v_ 0.2) Briefing de Contexto de Produtos Nexuz.md"
      version: "0.2"
      coverage:
        audiences: [Sales, Marketing]
        levels: [Operacional]
        has_examples: true
        cross_references: [Negócios, Personas]
      relevance_for_playbook: alta
      key_extracts:
        - "4 módulos principais: NXZ ERP, NXZ Go, NXZ KDS, NXZ Delivery. Diferenciais: integração total, escalabilidade, personalização, suporte FS."
        - "Modelo SaaS com preço por módulo × unidades × volume."
        - "Infra Oracle Cloud + LGPD + integrações com adquirentes (Stone/Cielo/PagSeguro/SumUp) e plataformas delivery (iFood/Rappi)."
        - "KPIs de produto: adoção, retenção, vendas processadas, NPS, uptime."
      gaps:
        - "Não menciona NXZ Pay Go explicitamente (escopo ampliado do briefing-config)."
        - "Sem tabela de preços (confidencial)."

    - file: "(v_1.0) Briefing de Contexto - NXZ Go - Sales - Operacional.md"
      version: "1.0"
      coverage:
        audiences: [Sales]
        levels: [Operacional]
        has_examples: true
        cross_references: [ERP, Totem, PDV, Smart POS, KDS, Delivery]
      relevance_for_playbook: alta
      key_extracts:
        - "Template estrutural do playbook: seções de Pitch 30s, Wow moments, Matriz de Decisão por dor/tamanho/operação, Objeções com respostas, Upsell, Terminologia, Dados reais para credibilidade."
        - "Regra crítica: KDS NÃO é modo do NXZ Go — sistema separado (reforço da memória do projeto)."
        - "3 modos do NXZ Go: Totem (cliente), PDV (caixa), Smart POS (operador móvel)."
        - "Dados reais: 3.184 pedidos processados, R$ 146.715 em vendas, ticket médio R$ 46,07 — usar como prova social em demo/proposta."
      gaps:
        - "Agnóstico de funil — não aterra em Pipefy nem em etapas de venda."
        - "Sem roteiros de qualificação e fechamento de suíte completa (só conteúdo do Go)."

    - file: "(v_1.0) Briefing de Contexto - NXZ Go PDV - Marketing+Vendas - Operacional.md"
      version: "1.0"
      coverage:
        audiences: [Sales, Marketing]
        levels: [Operacional]
        has_examples: true
        cross_references: [NXZ Go, ERP, KDS]
      relevance_for_playbook: media
      key_extracts:
        - "Diferenciais de PDV: controle de caixa (abertura/sangria/fechamento), modo restaurante, edição de preço, relatório por turno."
        - "Casos de uso: restaurante com mesa, cafeteria alto volume, bar/cervejaria, franquia com PDV padronizado."
      gaps:
        - "Conteúdo repetido no Sales Operacional do NXZ Go."

    - file: "(v_1.0) Briefing de Contexto - NXZ Go Totem - Marketing+Vendas - Operacional.md"
      version: "1.0"
      coverage:
        audiences: [Sales, Marketing]
        levels: [Operacional]
        has_examples: true
        cross_references: [NXZ Go, ERP, KDS]
      relevance_for_playbook: media
      key_extracts:
        - "Diferenciais do Totem: whitelabel total, screensaver de marketing 24h, pagar no caixa (zero abandono), modo imersivo, split bill."
        - "Segmentos-alvo: cafeteria, fast food, praça de alimentação, padaria, pop-up."
      gaps:
        - "Mesmas lacunas do PDV (conteúdo tático de funcionalidade, não funil)."

    - file: "(v_1.0) Briefing de Contexto - NXZ Go Smart POS - Marketing - Operacional.md"
      version: "1.0"
      coverage:
        audiences: [Marketing]
        levels: [Operacional]
        has_examples: true
        cross_references: [NXZ Go, ERP]
      relevance_for_playbook: media
      key_extracts:
        - "Pagamento nativo zero latência, impressora integrada, multi-fabricante (Stone/Cielo/PagBank/MSiTef), tudo-em-1 (PDV + maquininha + impressora)."
        - "Casos de uso: food truck, garçom na mesa, delivery com cobrança, eventos/pop-up — custo R$ 500-1.500 vs R$ 3-5K PDV fixo."
      gaps:
        - "Voltado a Marketing; precisa ser traduzido para pitch de vendedor e objeções."

    - file: "(v_1.0) Briefing de Contexto - NXZ ERP - Marketing - Operacional.md"
      version: "1.0"
      coverage:
        audiences: [Marketing]
        levels: [Operacional]
        has_examples: true
        cross_references: [NXZ Go, KDS, Delivery]
      relevance_for_playbook: alta
      key_extracts:
        - "NXZ ERP é backend obrigatório da suíte — toda venda de Go/KDS/Delivery exige ERP."
        - "Módulos: compras, produção, vendas, finanças, contabilidade, estoque, comunicação interna."
      gaps:
        - "Voltado a Marketing — sem roteiro de qualificação nem objeções comerciais de ERP."

    - file: "comparativo.md"
      version: null
      coverage:
        audiences: [Sales, Produto]
        levels: [Operacional]
        has_examples: true
        cross_references: [NXZ Go (Totem/PDV/Smart POS)]
      relevance_for_playbook: media
      key_extracts:
        - "Matriz de diferenças entre PDV, Totem e Smart POS — útil para consultivo em demo."
        - "Smart POS não roda KDS (limitação de hardware) — reforça separação KDS × NXZ Go."
      gaps:
        - "Não cobre ERP/Delivery; não tem amarração com etapa de funil."

    - file: "fluxos.md"
      version: null
      coverage: {audiences: [Produto, Sales], levels: [Operacional], has_examples: true, cross_references: []}
      relevance_for_playbook: baixa
      key_extracts:
        - "Fluxos técnicos de operação — útil como referência em demo consultiva FS, não para qualificação."
      gaps:
        - "Baixa relevância direta para playbook de vendas."

    - file: "ClickUp — Funil NXZ · v1 0 33c15efd475d8198a444cc26f883cbfd.md"
      version: "1.0 (histórico)"
      coverage:
        audiences: [Sales]
        levels: [Operacional]
        has_examples: true
        cross_references: [Funil antigo]
      relevance_for_playbook: baixa
      key_extracts:
        - "Referência histórica do funil antigo em ClickUp — substituído pelo Pipefy (Fonte 2). Serve apenas para mostrar o que mudou."
      gaps:
        - "Desatualizado. Não usar como fonte primária; PDD e Pipe Pipefy são canônicos."

  reference_sources:
    - name: "PDD Backoffice (Fonte 1 — espinha dorsal)"
      file: "/home/walterfrey/Documentos/code/nexuz/nxz-tutorial-agents/squads/nxz-backoffice-processes/output/2026-04-16-165948/v6/process-design-document.md"
      doc_id: "PDD-NXZ-VENDAS-001 v1.0 (2026-04-17)"
      process_owner: "Caroline Oliveira (Ops de Vendas)"
      sponsor: "Walter Frey (Gestão)"
      process_stages:
        - stage_id: S1A
          name: "Novo Lead — Inbound"
          objective: "Receber lead do canal digital (formulário/site), validar dados mínimos e encaminhar para Qualificação."
          responsible: "Ops de Vendas (Carol)"
          entry_criteria: ["Nome", "Empresa", "Canal de contato", "Checkbox LGPD"]
          exit_criteria: ["Dados mínimos OK → Qualificação (R1)", "Inbound com 6/6 no Checklist Binário → pula para Demo Agendada (R4)"]
          deliverables: ["Card criado no Pipe Vendas (Phase 1)", "Ops responsável atribuído"]
          sla: "2h úteis para primeira resposta"
        - stage_id: S1B
          name: "Novo Lead — Outbound"
          objective: "Prospect identificado ativamente (LinkedIn, eventos, redes). Criar card com Reason to Call, ICP e LinkedIn."
          responsible: "Ops de Vendas"
          entry_criteria: ["Nome", "Cargo", "Empresa", "LinkedIn URL", "Canal preferido", "Reason to Call", "ICP"]
          exit_criteria: ["Card criado e movido para Qualificação (R2)"]
          deliverables: ["Card outbound com Reason to Call personalizado"]
          sla: "48h úteis para criação do card"
        - stage_id: S1C
          name: "Novo Lead — Indicação"
          objective: "Formalizar lead vindo por indicação (parceiro, cliente, contato), registrar 'Quem indicou' e retornar feedback ao indicador."
          responsible: "Ops de Vendas"
          entry_criteria: ["Nome", "Empresa", "Canal", "Quem indicou", "Contexto"]
          exit_criteria: ["Dados validados → Qualificação"]
          deliverables: ["Card de indicação", "Feedback ao indicador em até 7 dias (T-29)"]
          sla: "2h úteis para resposta + 7 dias para feedback ao indicador"
        - stage_id: S2
          name: "Qualificação"
          objective: "Executar qualificação 100% humana via 4 toques em 8 dias (D+0/D+1/D+3/D+7). Preencher Checklist Binário 6/6 (fit, faturamento, dor, nº unidades, decisor, urgência)."
          responsible: "Ops de Vendas"
          entry_criteria: ["Dados mínimos de entrada preenchidos (GT-01)"]
          exit_criteria: ["Checklist Binário 6/6 = true (GT-02) → Demo Agendada", "D+8 sem gate → Nutrição ou Descarte (R6)"]
          deliverables: ["Checklist Binário completo", "ICP classificado (QS/FS/Zona fronteira/Fora ICP)", "Dor central documentada", "Decisor confirmado (papel no comitê)"]
          sla: "8 dias corridos; alerta D+2 se 48h sem ação"
        - stage_id: S3
          name: "Demo Agendada"
          objective: "Agendar e conduzir demo segmentada: QS (simplificada, mensagem) ou FS (consultiva, PDF)."
          responsible: "Ops de Vendas"
          entry_criteria: ["Checklist Binário 6/6", "Data da demo", "Tipo de demo (QS/FS)", "Decisores confirmados para demo", "Cliente vinculado", "Contatos vinculados"]
          exit_criteria: ["Demo realizada → Pós-demo (qualquer status)"]
          deliverables: ["Demo executada conforme roteiro QS ou FS", "Notas de descoberta", "Dor confirmada"]
          sla: "Data da demo + 1 dia útil para registrar desfecho"
        - stage_id: S4
          name: "Pós-demo"
          objective: "Capturar desfecho da demo: aceite verbal, sem aceite, ou no-show. Decidir próximo passo."
          responsible: "Ops de Vendas"
          entry_criteria: ["Demo realizada"]
          exit_criteria: ["Status demo = 'Realizada com aceite' + aceite verbal = true → Proposta (R11)", "'Sem aceite' → Nutrição ou Descarte (R10)", "'No-show' → reagendamento ≤3x ou Nutrição (R9, EXT-05)"]
          deliverables: ["Status demo registrado", "Aceite verbal documentado (gate absoluto)", "Dor confirmada"]
          sla: "3 dias corridos"
        - stage_id: S5
          name: "Proposta"
          objective: "Enviar proposta comercial (QS: mensagem; FS: PDF consultivo com diagnóstico, rollout, data de resposta). Executar cadência de follow-up até aceite ou decisão."
          responsible: "Ops de Vendas (propõe), Gestão (aprova desconto >15%)"
          entry_criteria: ["Aceite verbal = true", "Dor confirmada", "Data demo realizada"]
          exit_criteria: ["Aceite proposta = true (GT-07) → Fechamento", "D+15 sem resposta → Nutrição ou Descarte"]
          deliverables: ["Proposta (mensagem ou PDF)", "Preço base", "Margem aplicada", "Valor proposto final", "MRR", "Módulos contratados"]
          sla: "15 dias corridos (follow-up D+3 auto, alerta D+7, decisão D+15)"
        - stage_id: S6
          name: "Fechamento"
          objective: "Coletar dados fiscais, emitir cobrança (Financeiro), emitir contrato e coletar assinatura digital (Gestão)."
          responsible: "Ops de Vendas (orquestra); Financeiro (cobrança); Gestão (contrato)"
          entry_criteria: ["Aceite proposta = true", "Valor proposto final", "MRR", "Módulos contratados"]
          exit_criteria: ["Pagamento confirmado = true AND Contrato assinado = true → GANHO automático (R19/GT-08)"]
          deliverables: ["CNPJ (14 dígitos)", "Razão social", "Boleto emitido", "Pagamento confirmado", "Contrato assinado"]
          sla: "10 dias corridos (CNPJ 48h + pagamento 5 dias + contrato 3 dias pós-boleto)"
        - stage_id: S7
          name: "GANHO"
          objective: "Transição automática disparada por pagamento + contrato ambos true. Handoff para Implantação."
          responsible: "Repositório (automação A-13)"
          entry_criteria: ["Pagamento confirmado + Contrato assinado (F-GANHO)"]
          exit_criteria: ["Card movido para GANHO + registro de Implantação criado no Pipe Implantação"]
          deliverables: ["Registro de Implantação com pacote completo (dados fiscais, módulos, dor, MRR, histórico)"]
          sla: "Automático (ato)"
        - stage_id: S8
          name: "DESCARTE"
          objective: "Registrar encerramento negativo com motivo obrigatório (1 de 9) e campos condicionais."
          responsible: "Ops de Vendas"
          entry_criteria: ["Decisão de descarte tomada"]
          exit_criteria: ["Motivo + campos condicionais preenchidos. Card NUNCA reaberto (R29)."]
          deliverables: ["Registro de descarte para análise de ICP e aprendizado"]
          sla: "Imediato; bloqueio automático se motivo vazio (R25)"
        - stage_id: S_NUT
          name: "Nutrição (pipe paralelo)"
          objective: "Manter lead com sinal fraco aquecido. Ciclo 1 (30d) + Ciclo 2 (30d) com revisão humana D+30 e D+60. Descarte automático D+67 se sem decisão."
          responsible: "Ops de Vendas + Repositório (automação)"
          entry_criteria: ["Decisão de Nutrição tomada + motivo + ciclo"]
          exit_criteria: ["Reaquecida → card NOVO em Qualificação (nunca reabre antigo — R23)", "D+67 → Descarte automático (R24)"]
          deliverables: ["E-mails D+7 e D+15 (ciclo 1), D+37 e D+45 (ciclo 2)", "Revisão humana D+30 e D+60"]
          sla: "30 + 30 + 7 dias"

      icp:
        segments: ["QS — Quick Serve (cafeteria, fast food, padaria, food truck, to-go)", "FS — Full Serve (restaurante com mesa, bar/cervejaria, rede com comanda)", "Zona de fronteira (avaliar caso a caso)", "Fora de ICP (descarte imediato)"]
        size_range: "Faturamento mensal > 0 declarado (a calibrar baseline em D+30). Portes típicos: micro (1-2 pessoas / Smart POS), pequena (3-10 / PDV + opcional Totem), média (10-30 / suíte), grande/franquia (suíte + multi-unidade)."
        geography: "Brasil. UFs cobertas no cadastro de Conta. Foco inicial sem restrição geográfica explícita."
        buying_committee: ["Decisor = Proprietário/Sócio (papel obrigatório no Checklist Binário item 5)", "Influenciador = Gerente de Operação", "Operacional = Caixa/Garçom/Cozinha", "Gatekeeper = Secretária/Recepção (identificar cedo)"]
      disqualification_criteria:
        - "Fora de ICP (motivo 1): não atende perfil QS/FS, ex: indústria, varejo não-FS."
        - "Faturamento abaixo (motivo 2): abaixo do mínimo viável a calibrar — [a confirmar na entrevista]."
        - "Sem orçamento (motivo 3): fit existe mas orçamento indisponível — pode nutrir por 3 meses."
        - "Tem sistema atual e não quer trocar (motivo 4): satisfação com solução atual — nutrir por 6 meses."
        - "Projeto adiado/congelado (motivo 5): nutrir 3 meses."
        - "Perdeu para concorrente (motivo 6): exige campo 'Qual concorrente'."
        - "Preço acima do aceito (motivo 7): nutrir 3 meses com nova condição."
        - "Não viu valor/fit técnico (motivo 8): revisar demo; nutrir 6 meses."
        - "Sumiu/sem resposta (motivo 9): exige campo 'Último canal tentado'. 4 tentativas em 8 dias esgotadas."
      key_metrics:
        top_line: ["MT-01 MRR novo (R$/mês)", "MT-02 Nº fechamentos/mês", "MT-03 Ticket médio"]
        alavanca: ["MA-01 Demos agendadas/mês", "MA-02 Propostas enviadas/mês", "MA-03 Leads outbound/semana"]
        diagnostico: ["MD-01 Win Rate (GANHO / (GANHO+DESCARTE))", "MD-02/03 Ciclo médio QS (≤30d) e FS (≤45d)", "MD-04 No-show rate (≤15%)", "MD-05 Lead→MQL (≥70%)", "MD-06 MQL→SAL (≥40%)", "MD-07 SAL→Ganho (≥30%)", "MD-08 Ganho→Live (≥95%)", "MD-09 Taxa reativação Nutrição (≥20%)", "MD-10 Distribuição de motivos de descarte"]
        nota: "Todos os targets são ilustrativos. Baselines reais a calibrar em D+30/D+60 (PDD §8)."

    - name: "Pipe Pipefy (Fonte 2 — aterragem operacional)"
      file: "/home/walterfrey/Documentos/code/nexuz/nxz-tutorial-agents/squads/nxz-pipefy-setup/output/2026-04-20-162723/v1/"
      pipe_name: "Vendas"
      plan: "Enterprise/Unlimited (quota ≥2.000 automation jobs/mês; consumo estimado ~250/mês → 87% folga)"
      start_form_fields_essenciais: ["Nome do contato", "E-mail", "Telefone/WhatsApp", "Empresa", "Origem (Inbound/Outbound/Indicação/Evento/Parceiro)", "Canal preferido", "Consentimento LGPD (se Inbound)", "Quem indicou (se Indicação)", "Reason to Call/ICP/LinkedIn/Cargo (se Outbound)", "Cliente vinculado (opcional inicialmente)"]
      phases:
        - phase_id: "P1"
          name: "Novo Lead"
          done: false
          sla: "2h úteis (Inbound/Indicação) / 48h úteis (Outbound)"
          required_fields: ["Ops responsável (assignee)", "Campos do Start Form conforme Origem"]
          key_fields: ["Origem", "Canal preferido", "Consentimento LGPD"]
          automations: ["A-14 Feedback indicador D+7 (se Origem=Indicação)"]
          email_templates: []
          exit_conditions: ["Dados mínimos OK → avança para Qualificação", "Inbound com Checklist 6/6 → pula para Demo Agendada (R4)"]
        - phase_id: "P2"
          name: "Qualificação"
          done: false
          sla: "8 dias corridos (48h de inatividade dispara alerta)"
          required_fields: ["Checklist Binário (6 checkboxes)", "Faturamento mensal", "Dor central (long_text)", "Nº unidades", "Urgência (long_text)", "≥1 Contato com papel=Decisor"]
          key_fields: ["Data MQL (auto)", "Data SAL (auto na saída)"]
          automations: ["A-01 Marcar Data MQL (ao entrar)", "A-02 Marcar Data SAL (ao sair)", "A-04 E-mail D+1 (ET-01)", "A-05 E-mail D+3 (ET-02)", "A-06 E-mail D+7 (ET-03)", "A-07 Alerta SLA D+8", "A-15 Alerta 48h inativo"]
          email_templates: ["ET-01 'Que bom te conhecer'", "ET-02 'Um insight que pode ajudar'", "ET-03 'Última tentativa esta semana'"]
          exit_conditions: ["Checklist 6/6 = true → Demo Agendada (GT-02)", "D+8 sem 6/6 → decidir Nutrição ou Descarte"]
        - phase_id: "P3"
          name: "Demo Agendada"
          done: false
          sla: "Data da demo + 1 dia útil"
          required_fields: ["Cliente vinculado", "Contatos vinculados (≥1 decisor)", "Data da demo", "Tipo de demo (QS/FS)", "Quem vai conduzir", "Decisores na demo (texto)"]
          key_fields: []
          automations: []
          email_templates: []
          exit_conditions: ["Demo realizada (qualquer status) → Pós-demo"]
        - phase_id: "P4"
          name: "Pós-demo"
          done: false
          sla: "3 dias corridos"
          required_fields: ["Status demo (Realizada com aceite / sem aceite / No-show)", "Aceite verbal (se aceite)", "Dor confirmada", "Data demo realizada"]
          key_fields: ["Contagem de reagendamentos"]
          automations: []
          email_templates: []
          exit_conditions: ["Aceite verbal = true → Proposta", "No-show + reagendamentos <3 → reagendar", "No-show + reagendamentos ≥3 → Nutrição (EXT-05)", "Sem aceite → Nutrição ou Descarte"]
        - phase_id: "P5"
          name: "Proposta"
          done: false
          sla: "15 dias corridos (auto-email D+3, alerta D+7, decisão D+15)"
          required_fields: ["Data proposta enviada", "Preço base", "Margem aplicada (%)", "Valor proposto final", "MRR", "Módulos contratados", "Aceite proposta (gate absoluto)"]
          key_fields: ["Desconto (%)", "Proposta (anexo)"]
          automations: ["A-08 E-mail follow-up D+3 (ET-04)", "A-09 Alerta interno D+7", "A-10 Alerta decisão D+15", "A-12 Desconto >15% → notifica Gestão"]
          email_templates: ["ET-04 'Conseguiu avaliar a proposta?'"]
          exit_conditions: ["Aceite proposta = true → Fechamento (GT-07)", "D+15 sem resposta → Nutrição ou Descarte"]
        - phase_id: "P6"
          name: "Fechamento"
          done: false
          sla: "10 dias (CNPJ 48h + pagamento 5 dias + contrato 3 dias)"
          required_fields: ["CNPJ (14 dígitos, único)", "Razão social", "Boleto emitido (Financeiro)", "Pagamento confirmado (Financeiro)", "Contrato assinado (Gestão)"]
          key_fields: []
          automations: ["A-11 Alerta 5d sem pagamento", "A-13 GANHO automático quando pgto+contrato=true"]
          email_templates: []
          exit_conditions: ["Pagamento + contrato ambos true → GANHO automático (R19)"]
        - phase_id: "P7"
          name: "GANHO"
          done: true
          sla: "Automático"
          required_fields: []
          key_fields: ["Data Ganho (auto)", "Notas de handoff"]
