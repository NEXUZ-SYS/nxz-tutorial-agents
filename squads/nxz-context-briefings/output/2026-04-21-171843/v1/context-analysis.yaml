  best_practices_research:
    principles:
      - principle: "BANT simplificado (Budget/Authority/Need/Timeline) é suficiente para deals SMB/mid-market de ACV menor; MEDDIC só agrega em deals enterprise (>R$100k ARR)."
        source: "BANT vs MEDDIC: Choosing the Right Sales Qualification Framework in 2026 — outdoo.ai"
        applicability: "Nexuz vende SaaS Food Service com ticket mensal médio indicativo baixo (R$128-153/módulo × unidades); BANT é a base correta, com 1 adendo MEDDIC: identificar Economic Buyer (Proprietário = item 5 do Checklist Binário 'Decisor confirmado'). O Checklist Binário do PDD JÁ É uma forma BANT-adjacente (Faturamento=Budget, Decisor=Authority, Dor=Need, Urgência=Timeline) + 2 extras (Fit/ICP e Nº unidades). Fortalecer no playbook: renomear internamente cada item do Checklist ao dimensão BANT correspondente para treinar o Ops."
      - principle: "Em SaaS B2B moderno (2026), o vendedor é 'champion builder': precisa identificar quem internamente vai defender a compra mesmo quando o vendedor não está na sala."
        source: "Sales Qualification: BANT, MEDDIC & SPICED for B2B SaaS (2026) — nimitai.com"
        applicability: "No Food Service, o 'champion' típico é o Gerente de Operação (sofre dor diária de caixa/estoque/cozinha) e o Proprietário só valida financeiramente. No playbook §4, adicionar uma linha: 'após confirmar decisor (Proprietário), procurar o Gerente de Operação como champion interno — ele replica a proposta internamente entre uma reunião e outra'."
      - principle: "Frameworks híbridos por segmento: BANT para ≤R$25k, MEDDIC para ≥R$100k."
        source: "BANT vs MEDDIC: Which Sales Qualification Framework Wins? — sybill.ai"
        applicability: "Nexuz pode evoluir: BANT para QS (Quick Serve, ticket menor), MEDDIC para FS/multi-unidade/franquia (ticket × unidades pode ultrapassar R$100k anuais fácil). Playbook v1: BANT unificado; playbook v2: diferenciar."
      - principle: "Cadência de 4 toques em 8 dias é o padrão recomendado para inbound SMB SaaS — acima disso, ROI de follow-up cai."
        source: "BANT qualified leads: modern framework and AI automation in 2026 — monday.com"
        applicability: "A cadência do PDD §6.1 (D+0/D+1/D+3/D+7, 4 toques em 8d) está ALINHADA com best practice. Reforçar no playbook que D+8 sem resposta é o corte correto para mover para Nutrição — evitar 'over-follow-up' que deteriora reputação e bounce rate."
      - principle: "Em SaaS 2026, e-mail é canal de backup; o canal primário de qualificação SMB é mensageria (WhatsApp no Brasil, iMessage em outros mercados)."
        source: "Modern SaaS Qualification (industry consensus, vários resultados)"
        applicability: "PDD R35 explícita WhatsApp como canal primário. Playbook DEVE ter templates de WhatsApp (curtos, conversacionais) complementando os ET-01/02/03/04 de e-mail. Hoje existem só templates de e-mail no Pipefy; WhatsApp é ação humana do Ops — documentar no playbook."

