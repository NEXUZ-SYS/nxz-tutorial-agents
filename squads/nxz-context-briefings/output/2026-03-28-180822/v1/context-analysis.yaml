          - "Dados fiscais e de venda sincronizados via ERP"
          - "Comandos remotos via WebSocket Odoo Bus"

      - from: NXZ ERP
        to: NXZ Delivery
        relation: backend-integracao
        integration_points:
          - "Centralizacao de pedidos de multiplas plataformas"
          - "Sincronizacao de estoque e cardapio"
          - "Dados de venda e fiscal"

      - from: NXZ Go (PDV/Totem/Smart POS)
        to: NXZ KDS
        relation: producer-consumer
        integration_points:
          - "Pedidos criados no PDV/Totem aparecem no KDS em tempo real via Firebase/Supabase"
          - "Drafts e comandas visiveis no KDS para preparacao antecipada"
          - "Modo BOTH permite alternar entre PDV e KDS no mesmo dispositivo"

      - from: NXZ KDS
        to: iFood
        relation: integracao-delivery
        integration_points:
          - "Aceite, rejeicao e disputa de pedidos iFood"
          - "Status do merchant (aberto/fechado)"
