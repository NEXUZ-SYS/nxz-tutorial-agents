          - "Configuracoes de whitelabel definidas no ERP"
          - "Vendas processadas pelo NxzGo e sincronizadas ao ERP"
          - "Nota fiscal (NFC-e) emitida via backend ERP"
          - "WebSocket Odoo Bus para atualizacoes em tempo real de produtos"

      - from: NXZ ERP
        to: NXZ Go (Totem)
        relation: backend-frontend
        integration_points:
          - "Mesmos pontos do PDV"
          - "Configuracoes de whitelabel (cores, logos, textos, screensavers) definidas no ERP"
          - "Tabelas de preco geridas no ERP"

      - from: NXZ ERP
        to: NXZ Go (Smart POS)
        relation: backend-frontend
        integration_points:
          - "Mesmos pontos do PDV"
          - "Configuracao de flavor/terminal gerida no ERP"

