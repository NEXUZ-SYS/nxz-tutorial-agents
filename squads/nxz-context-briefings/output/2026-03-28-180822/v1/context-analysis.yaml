          - "Pedidos agendados"

      - from: NXZ KDS
        to: Open Delivery
        relation: integracao-delivery
        integration_points:
          - "Keeta (Google), 99Food, VCQPad"
          - "Padrao Open Delivery para novas plataformas"

  document_quality_assessment:
    strengths:
      - "Documentos do NxzGo sao extremamente detalhados e bem estruturados (gerados por analise de codebase)"
      - "Cobertura completa dos modos de operacao do NxzGo (PDV, Totem, KDS, Smart POS)"
      - "Fluxos Mermaid documentam visualmente os processos end-to-end"
      - "Comparativo entre modos e claro e util"
      - "Briefings gerais (v0.2-v0.4) fornecem boa base estrategica"
