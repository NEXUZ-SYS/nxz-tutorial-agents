  summary:
    total_files: 12
    files_with_erp_coverage:
      superficial: 3  # briefings de persona, negocios e produtos
      referencial: 7  # documentos do NxzGo que mencionam ERP como backend
      none: 2         # comparativo.md e funcionalidades KDS
      deep: 0         # nenhum documento tem cobertura profunda do ERP
    products_with_dedicated_docs:
      NXZ_Go_PDV: 2   # briefing + funcionalidades
      NXZ_Go_Totem: 1
      NXZ_Go_KDS: 2   # briefing + funcionalidades
      NXZ_Go_Smart_POS: 1
      NXZ_Go_Arquitetura: 1
      NXZ_ERP: 0      # NENHUM documento dedicado ao ERP
      NXZ_Delivery: 0
    audience_distribution:
      engenharia: 9
      produto: 10
      marketing: 3   # apenas os 3 briefings gerais
      vendas: 3
      estrategia: 1
    level_distribution:
      strategic: 3
      tactical: 4
      operational: 9

  critical_finding: >
    O NXZ ERP NAO possui NENHUM documento de contexto dedicado. E o produto
    central do ecossistema Nexuz (todos os outros dependem dele como backend),
    mas e mencionado apenas de forma superficial nos 3 briefings gerais e
    referencialmente nos 9 documentos do NxzGo. Nao existe descricao de suas
    telas, fluxos, modulos detalhados, diferenciais ou beneficios em linguagem
    de marketing. Isso e uma lacuna critica para a geracao de conteudo de marketing.

  recommendations:
    template_structure:
      - section: "Visao Geral do Produto"
        purpose: >
          Descricao do NXZ ERP como produto — o que e, para quem, problema que resolve.
          Incluir que e baseado em Odoo 12, hospedado em Oracle Cloud, com foco em Food Service.
        priority: alta

      - section: "Proposta de Valor para Marketing"
        purpose: >
          Beneficios traduzidos em linguagem de marketing — reducao de tempo, economia,
          controle financeiro simplificado, integracao total. Com frases prontas para copy,
          taglines e argumentos de venda.
        priority: alta

      - section: "Modulos e Funcionalidades Detalhados"
        purpose: >
          Descricao de cada modulo do ERP (Compras, Estoque, Vendas/PDV, Financas,
          Contabilidade, Comunicacao Interna, Relatorios/BI) com: o que faz, como funciona
          no dia a dia, prints de tela, beneficio para o usuario.
        priority: alta

      - section: "Fluxos Operacionais (Workflows)"
        purpose: >
          Fluxos passo-a-passo do ERP: abertura de caixa, lancamento de compra, controle
          de estoque, fechamento financeiro, emissao de relatorios. Essenciais para criar
          tutoriais, posts educativos e conteudo how-to.
        priority: alta

      - section: "Capturas de Tela e Elementos Visuais"
        purpose: >
          Screenshots anotados das principais telas do ERP para uso em materiais de marketing,
          landing pages, posts de redes sociais e materiais de vendas.
        priority: alta

      - section: "Integracao com Ecossistema NXZ"
        purpose: >
          Como o ERP se conecta com NXZ Go (PDV/Totem/Smart POS), NXZ KDS, NXZ Delivery
          e NXZ Pay Go. Diagrama de integracao simplificado para marketing.
        priority: media

      - section: "Casos de Uso e Cenarios"
        purpose: >
          Exemplos praticos por tipo de estabelecimento (restaurante, bar, food truck, franquia).
          Storytelling de como o ERP resolve problemas reais do dia a dia.
        priority: media

      - section: "Diferenciais Competitivos"
        purpose: >
          O que diferencia o NXZ ERP de concorrentes no setor Food Service
          (ex: Saipos, Consumer, Goomer, Linx, TOTVS). Tabela comparativa para vendas.
        priority: media

      - section: "FAQ e Objecoes"
        purpose: >
          Perguntas frequentes e respostas para objecoes comuns em marketing/vendas.
          Util para chatbots, landing pages e materiais de suporte a vendas.
        priority: baixa

      - section: "Glossario de Termos"
        purpose: >
          Traducao de termos tecnicos (BOM, NFC-e, SAT, CF-e, KDS, PDV, webhook, cron)
          para linguagem acessivel ao publico de marketing e clientes.
        priority: baixa

    missing_information:
      - item: "Telas e interface do ERP (screenshots)"
        source: playwright
        rationale: >
          Nenhum dos 12 documentos contem capturas de tela. Para marketing, imagens das
          telas reais sao essenciais. O ERP pode ser acessado via browser para captura
          automatizada com Playwright.
        priority: alta

      - item: "Modulos detalhados do Odoo 12 customizado (Compras, Estoque, Financas, Contabilidade, RH)"
        source: documentation
        rationale: >
          Os briefings listam modulos em uma linha cada. Nao ha descricao do que cada modulo
          faz na pratica, quais telas tem, quais campos, quais relatorios gera. Esta informacao
          pode ser extraida do Odoo via MCP (search models, get model schema) e da documentacao existente.
        priority: alta

      - item: "Fluxos operacionais do ERP (passo a passo)"
        source: interview
        rationale: >
          Nenhum documento descreve os workflows do ERP em si. Os fluxos.md cobrem apenas o NxzGo.
          Precisa-se de fluxos como: cadastro de produto, abertura de sessao POS, lancamento de
          compra, fechamento de caixa, conciliacao financeira, emissao de NF.
        priority: alta

      - item: "Beneficios quantificados (metricas de antes vs depois)"
        source: interview
        rationale: >
          Nenhum documento apresenta dados numericos de impacto (ex: reducao de 40% no tempo
          de fechamento, aumento de 25% no ticket medio). Essencial para copy de marketing.
        priority: alta

      - item: "Linguagem de marca e tom de voz"
        source: interview
        rationale: >
          O briefing de negocios lista valores (Empatia, Colaboracao, Evolucao, Transparencia, Respeito)
          mas nao ha guia de tom de voz, palavras-chave da marca ou diretrizes de comunicacao.
        priority: media

      - item: "Planos e precificacao do ERP"
        source: interview
        rationale: >
          O modelo SaaS e mencionado mas sem detalhes. Para marketing, saber os planos
          (modulos incluidos, faixas de preco, diferencas entre planos) e fundamental.
        priority: media

      - item: "Relatorios e dashboards do ERP (tipos, exemplos)"
        source: playwright
        rationale: >
          Dashboards sao mencionados como diferencial em 3 documentos, mas nenhum descreve
          quais relatorios existem, que dados mostram ou como se parecem.
        priority: media

      - item: "Depoimentos e casos de sucesso de clientes"
        source: interview
        rationale: >
          Nao ha nenhum material de social proof. Depoimentos de clientes reais sao
          fundamentais para marketing de confianca no setor Food Service.
        priority: media

      - item: "Informacoes sobre NXZ Delivery e NXZ Pay Go"
        source: documentation
        rationale: >
          NXZ Delivery e mencionado nos briefings gerais mas nao possui documento dedicado.
          NXZ Pay Go nao aparece em nenhum documento do context/. Ambos sao produtos do
          portfolio e precisam de contexto para marketing completo.
        priority: baixa

    cross_references:
