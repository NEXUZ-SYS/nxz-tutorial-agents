    - item: "Não há configuração Smart POS específica no Odoo"
      expected: "pos.config com tipo Smart POS"
      actual: "Apenas 1 pos.config genérica (PDV 1 Totem). Smart POS usa a mesma config — diferenciação é no hardware/app, não no backend."

  observacoes_marketing:
    - "Smart POS é o modo mais 'all-in-one' — tudo em um único dispositivo no bolso"
    - "Diferencial claro vs maquininhas tradicionais: PDV completo, não só cobrança"
    - "Multi-fabricante evita vendor lock-in — argumento forte para decisores"
    - "Pagamento nativo = zero latência, zero dependência externa"
    - "Impressão integrada elimina necessidade de impressora separada"
    - "Ideal para operações móveis, compactas e temporárias"
    - "Dados reais: 3.184 pedidos, R$ 146K, 182 produtos — sistema em produção real"
