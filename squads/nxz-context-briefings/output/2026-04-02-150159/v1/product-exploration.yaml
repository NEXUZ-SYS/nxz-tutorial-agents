      sdk: "SDK proprietário Stone (AAR)"
    - fabricante: PagBank
      terminal: "Moderninha Smart"
      application_id: "com.moober_self_checkout"
      versao: "1.1.1"
      sdk: "PlugPag Service Wrapper 1.30.51"
    - fabricante: Software Express
      terminal: "Terminais MSiTef"
      application_id: "N/A"
      versao: "N/A"
      sdk: "MSiTef SDK"

  funcionalidades_validadas:
    pagamento_nativo:
      descricao: "Pagamento direto no hardware sem APIs externas ou polling"
      metodos: ["Crédito", "Débito", "Voucher", "PIX"]
      todos_fabricantes: true
      fluxo: "App → SDK nativo → hardware (chip/NFC) → resultado → registro"

    impressao_integrada:
      descricao: "Impressora térmica nativa no terminal (V3)"
      formatos: ["DANFE (NF completa)", "Receipt (comprovante)", "Ticket (produção/cozinha)", "Sticker (etiqueta)", "Test"]
      automatica: true

    interface_compacta:
      descricao: "Layout PhoneView otimizado para telas ~5.5 polegadas"
      features: ["Categorias em chips horizontais", "Grid compacto", "Carrinho vertical", "Teclado numérico adaptado"]

    integracao_kds:
      descricao: "Pedidos enviados ao KDS automaticamente"
      campos_odoo: ["sent_to_kds", "ident_in_kds", "date_in_kds", "allow_sent_pos_to_kds"]

    nota_fiscal_eletronica:
      descricao: "Emissão de NFe/NFC-e integrada"
      campos_odoo: ["nfe_number", "ambiente_nfe", "nfe_status", "invoice_eletronic_ids"]

    modo_both:
      descricao: "Terminal pode alternar entre PDV e KDS no mesmo dispositivo"

    offline_first:
      descricao: "Funciona sem internet, sincroniza quando reconecta"

    whitelabel:
      descricao: "Interface personalizável com marca do cliente"

    cancelamento_msitef:
      descricao: "Cache local de transações permite cancelamento posterior"
      exclusivo: "MSiTef"

  dados_reais_odoo:
