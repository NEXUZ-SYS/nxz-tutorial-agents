    key_differentiators_for_smart_pos:
      description: "Diferenciais unicos do Smart POS que devem ser destacados no briefing de marketing"
      differentiators:
        - name: "All-in-one no bolso"
          technical_fact: "Pedido + pagamento + impressao em um unico dispositivo"
          marketing_benefit: "Sem tablet, sem impressora Bluetooth, sem fio. Um aparelho faz tudo."
        - name: "Pagamento nativo instantaneo"
          technical_fact: "SDK nativo do fabricante, sem polling HTTP, sem latencia de rede"
          marketing_benefit: "Pagamento processa direto na maquininha — sem esperar, sem depender de internet para cobrar."
        - name: "Impressao integrada"
          technical_fact: "Impressora termica V3 integrada no hardware"
          marketing_benefit: "Comprovante impresso na hora, sem impressora separada, sem Bluetooth."
        - name: "Mobilidade total"
          technical_fact: "Dispositivo portatil com bateria propria"
          marketing_benefit: "Leve pra rua, pro evento, pra mesa do cliente. Vai onde o cliente esta."
        - name: "Multi-fabricante"
          technical_fact: "Builds nativos para Cielo, Stone, PagBank, MSiTef"
          marketing_benefit: "Funciona com a maquininha que voce ja tem. Nao precisa trocar."
        - name: "PDV completo"
          technical_fact: "Herda todas as funcionalidades do NXZ Go PDV"
          marketing_benefit: "Nao e uma maquininha que cobra. E um caixa completo que cabe na mao."
        - name: "Sem infraestrutura"
          technical_fact: "Nao requer tablet, impressora externa, ou cabeamento"
          marketing_benefit: "Zero investimento em equipamento adicional. Basta a maquininha."

