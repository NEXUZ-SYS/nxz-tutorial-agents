  # ============================================================
  # GAP ANALYSIS — SMART POS FOR MARKETING
  # ============================================================
  smart_pos_gap_analysis:
    what_exists:
      - source: "(V_0.1) NXZ SMART_POS.md"
        content_available:
          - "Visao geral tecnica: Smart POS = variante de build/hardware do NXZ Go"
          - "Publico-alvo tecnico: atendentes delivery, balcao compacto, food trucks, garcons"
          - "Funcionalidades core: deteccao de flavor, pagamento nativo, MSiTef, impressao V3, interface compacta"
          - "Provedores nativos: Cielo, Stone, PagBank, MSiTef com metodos suportados"
          - "Fluxo de pagamento nativo (5 etapas)"
          - "Build system multi-modulo"
          - "Hardware suportado: Cielo LIO, Stone POS, PagBank Moderninha Smart, terminais MSiTef"
          - "Integracao com Odoo ERP, Firebase/Supabase, SAT/NFC-e, Sentry"
          - "Regras de negocio (pagamento instantaneo, impressao mandatoria, valores em centavos)"
          - "Deploy via APK direto, sem Play Store"
          - "Estado atual: pontos fortes e areas de atencao"
      - source: "comparativo.md"
        content_available:
          - "Smart POS = PDV completo em maquininha"
          - "Limitacoes: sem KDS, sem WebView, sem polling de pagamento"
          - "Tudo que PDV/Totem faz, Smart POS tambem faz (com limitacoes hardware)"
          - "Pagamento via SDK nativo (sem rede)"
          - "Impressao V3 (termica integrada)"
          - "Config type pode ser caixa ou totem"
          - "Layout detectado como Phone"
      - source: "fluxos.md"
        content_available:
          - "Fluxo de inicializacao Smart POS (deteccao de flavor → adapter nativo)"
          - "Fluxo de pagamento nativo (paymentModule → NativeEventEmitter → resultado)"
      - source: "(V_0.1) NXZ GO.md"
        content_available:
          - "Contexto geral: Smart POS como um dos 4 modos do NXZ Go"
          - "Diagrama de conexao entre modos"
      - source: "NXZ Go - Funcionalidades.md"
        content_available:
          - "Lista completa de funcionalidades compartilhadas PDV/Totem/Smart POS"

    what_is_missing_for_marketing_briefing:
      critical:
        - section: "Identidade do Produto"
          description: "Falta 'O que e' em linguagem de negocio, 'Problema que resolve' com dores reais, 'Proposta de valor' com beneficios concretos"
          example_from_totem_briefing: "O NXZ Go Totem e um app de autoatendimento que transforma qualquer tablet Android em um totem de pedido com a marca do cliente."
          needed_for_smart_pos: "O NXZ Go Smart POS transforma a maquininha de cartao em um terminal completo de venda: pedido + pagamento + impressao em um unico dispositivo, sem tablet, sem celular, sem fio."

        - section: "Proposta de Valor com Exemplo"
          description: "Falta exemplo concreto de transformacao (antes/depois) como existe nos briefings Totem e PDV"
          example_from_pdv_briefing: "Restaurante to-go com 2 caixas e 1 totem. Maria abre o caixa as 7h..."
          needed_for_smart_pos: "Cenario: food truck com Smart POS Stone. Operador monta pedido na maquininha, cobra direto no cartao, imprime comprovante — tudo no mesmo aparelho. Sem tablet extra, sem impressora Bluetooth."

        - section: "Casos de Uso por Segmento"
          description: "Falta completamente. Os briefings ERP, Totem e PDV tem 5-6 casos cada."
          suggested_segments:
            - "Food truck / ambulante — operacao compacta, mobilidade total"
            - "Delivery — entregador recebe na porta com pagamento nativo"
            - "Balcao pequeno — 1 dispositivo faz tudo (loja de sushi, crepe)"
            - "Garcom com maquininha — atendimento e pagamento na mesa"
            - "Evento / pop-up — montagem rapida sem infra"
            - "Franquias compactas — quiosque em shopping/praca"

        - section: "Copy Pronto"
          description: "Falta completamente: headlines, sub-headlines, descricoes 25/50/100 palavras, CTAs"
          needed:
            - "Headlines (5-6 opcoes)"
            - "Sub-headlines (5-6 opcoes)"
            - "Descricoes curtas (25, 50, 100 palavras)"
            - "CTAs (4-5 opcoes)"

        - section: "Argumentos para Objecoes"
          description: "Falta completamente. Objecoes provaveis para Smart POS sao diferentes do Totem/PDV."
          likely_objections:
            - "Tela muito pequena para montar pedido"
            - "Maquininha e so pra pagamento"
            - "Ja tenho tablet + maquininha separados"
            - "E se o fabricante mudar o SDK?"
            - "Performance em hardware limitado"
            - "Qual maquininha comprar?"

      important:
        - section: "Contexto de Mercado"
          description: "Falta posicionamento do Smart POS no mercado de maquininhas inteligentes no Brasil"
          needed:
            - "Crescimento de Smart POS no Brasil (Cielo LIO, Stone, PagBank)"
            - "Diferenciacao: maquininha como PDV vs maquininha so para pagamento"
            - "Posicionamento vs concorrentes (apps nativos das adquirentes, sistema proprio da maquininha)"
            - "Tabela comparativa (como nos briefings Totem e PDV)"

        - section: "Terminologia e Glossario"
          description: "Falta glossario acessivel para nao-tecnicos"
          terms_to_include:
            - "Smart POS"
            - "Flavor / Build nativo"
            - "SDK nativo"
            - "Pagamento nativo vs polling"
            - "Impressao V3 / termica integrada"
            - "APK direto"
            - "Maquininha inteligente"

        - section: "Tom de Voz"
          description: "Falta definicao especifica para comunicacao do Smart POS"
          suggestion: "Foco: mobilidade, simplicidade, all-in-one. Tom: 'Tudo na palma da mao' — pratico, compacto, profissional."

      nice_to_have:
        - section: "Personas Especificas"
          description: "O briefing de personas geral nao cobre personas Smart POS. Faltam personas especificas."
          suggested_personas:
            - "Entregador de delivery — recebe pagamento na porta"
            - "Dono de food truck — precisa de tudo em um dispositivo"
            - "Garcom mobile — atende e cobra na mesa"
            - "Operador de quiosque compacto — espaco minimo"

        - section: "Cross-References em linguagem de negocio"
          description: "Fluxo Smart POS → ERP → KDS precisa ser descrito como jornada do usuario, nao como arquitetura tecnica"

        - section: "Multi-adquirente como diferencial"
          description: "Secao dedicada (como nos briefings Totem e PDV) mostrando que o Smart POS funciona com Stone, Cielo, PagBank — liberdade de escolha"

        - section: "Offline-first"
          description: "Secao dedicada sobre operacao offline (mesma abordagem dos briefings Totem e PDV)"

