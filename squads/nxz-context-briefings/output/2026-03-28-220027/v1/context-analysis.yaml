  # ======================================================================
  # RECOMMENDATIONS FOR PDV BRIEFING (v1.0)
  # ======================================================================

  recommendations:

    template_structure_for_pdv_v1_0:

      - section_name: "Metadata"
        purpose: "Identificar produto, versao, publico, nivel, objetivo"
        priority: "ALTA"
        example_content: |
          - Produto: NXZ Go PDV (Caixa)
          - Categoria: App de Frente de Caixa (Android)
          - Versao atual: 5.13.1
          - Publico-alvo do briefing: Marketing + Vendas
          - Nivel: Operacional
          - Objetivo: Contexto para geracao de conteudo de marketing e vendas

      - section_name: "Identidade do Produto"
        purpose: "O que e, qual problema resolve, qual proposta de valor"
        priority: "ALTA"
        example_content: |
          ### O que e
          NXZ Go PDV e um app de frente de caixa que transforma qualquer tablet Android
          em um PDV completo. Operador monta pedido, aplica desconto/cupom, processa
          pagamento (dinheiro, cartao, PIX) e emite nota fiscal — tudo integrado com ERP.

          ### Problema que resolve
          Restaurantes usam caixa registradora mecanica ou PDV desktop caros. Resultado:
          sem integracao com cozinha, sem controle de estoque em tempo real, sem fiscal
          automatico, equipe perde tempo com processos manuais.

          ### Proposta de valor
          PDV oferece: agilidade (5-10s por transacao), controle digital de caixa,
          fiscal automatico (NFC-e), integrado com ERP, multiplos pagamentos, offline-first.
          Resultado: reducao de fila, menor erro, maior seguranca, maior velocidade.

      - section_name: "Publico-Alvo"
        purpose: "Descrever quem usa, o que precisa, qual e o impacto"
        priority: "ALTA"
        example_content: |
          Operador de Caixa:
          - Perfil: Pessoa que processa transacoes (5-200/dia)
          - Precisa: Agilidade, seguranca, rastreamento
          - Dores: Fila, erro, diferenca de caixa
          - Impacto: Reduz tempo de fila, menor erro, confianca

          Gerente de Operacao:
          - Perfil: Supervisor que monitora desempenho
          - Precisa: Visibilidade em tempo real, controle
          - Dores: Pedidos perdidos, caixa nao fecha, sem rastreamento
          - Impacto: Relatorio diario automatico, caixa sempre fecha, rastreamento por operador

      - section_name: "Funcionalidades Principais"
        purpose: "Descrever COMO PDV resolve problema, com contexto comercial"
        priority: "ALTA"
        structure: |
          Para cada funcionalidade:
          - Nome da feature (ex: "Divisao de Conta")
          - O que faz (ex: "Permite 4 clientes pagarem separadamente")
          - Quando usar (ex: "Mesa de clientes amigos que vao rachar")
          - Impacto (ex: "Cliente nao precisa sair da mesa para pagar separado")

          Features PDV principais:
          1. Controle de Caixa (abertura/fechamento)
          2. Pagamentos multiplos (dinheiro, cartao, PIX, divisao)
          3. Comanda aberta (pagar depois)
          4. Desconto/cupom (manual ou codigo)
          5. Nota fiscal (NFC-e automatica)
          6. Modo restaurante com mesas
          7. Edicio de preco (com limite)
          8. Integracao com KDS (pedido vai para cozinha em 2s)

      - section_name: "Exemplos de Caso de Uso"
        purpose: "Tornar abstratas em historias reais"
        priority: "ALTA"
        example_content: |
          Exemplo 1 — Pizzaria com balcao + mesas
          Cenario: Pizzaria com 4 mesas e pedidos de balcao. 2 operadores de caixa.
          PDV resolve:
          - Caixa 1 abre sessao as 11h, caixa 2 abre as 13h
          - Quando mesa 3 pede pizza, operador registra: "Mesa 3, Pizza Grande", preco aparece
          - Desconto: gerente aprova desconto de 10% (limite pre-configurado)
          - Pagamento: cliente paga R$ 45 em dinheiro, troco calculado automaticamente
          - Fiscal: nota fiscal emitida automaticamente (NFC-e)
          - KDS: pedido chega em 2s na cozinha, nao precisa escrever em papel
          - Extrato: ao final do dia, caixa 1 fechou com R$ 2.450, caixa 2 com R$ 1.890
          Resultado: pizza pronta em 8min (vs 15min se houvesse delay de comunicacao)

      - section_name: "Diferenciais vs Concorrencia"
        purpose: "Argumentos para virar objecoes em vendas"
        priority: "MEDIA"
        example_content: |
          vs Caixa Registradora Mecanica:
          - Nenhum backup: PDV copia dados para cloud automaticamente
          - Sem fiscal digital: PDV emite NFC-e em segundos
          - Sem integracao: PDV conecta ao ERP, KDS, delivery

          vs PDV Desktop (Guarda, Pluggy):
          - Caro e fixo: PDV e app em tablet, menor custo, mobilidade
          - Setup complexo: PDV pronto em 1 dia
          - Sem real-time com cozinha: PDV conecta com KDS em 2s

      - section_name: "Restricoes e Requisitos"
        purpose: "Implementador nao fica com duvida sobre compatibilidade"
        priority: "MEDIA"
        example_content: |
          Hardware:
          - Minimo: Tablet 7" Android 7+
          - Recomendado: Tablet 10" Android 9+
          - Phone: 5.5"+ funciona mas nao e ideal

          Integracao:
          - Obrigatorio: NXZ ERP (backend)
          - Recomendado: NXZ KDS (para cozinha)
          - Opcional: Adquirente (Cielo, Stone, PagBank, SumUp)

          Internet:
          - Nao e obrigatoria para operacao (funciona offline)
          - Recomendada para fiscal (NFC-e) e sync com ERP
          - Se sem internet: dinheiro/offline apenas

      - section_name: "Implementacao e Timeline"
        purpose: "Cliente sabe quanto tempo leva"
        priority: "MEDIA"
        example_content: |
          Semana 1: Setup ERP
          - Catalogo de produtos
          - Mesas (se restaurante)
          - Usuarios e caixas
          - Tabelas de preco
          - Config de pagamento

          Semana 2: Hardware e Pagamento
          - Compra/aluga tablet
          - Configura integracao com adquirente (Cielo, Stone, etc)
          - Configura impressora fiscal
          - Testa pagamento

          Semana 3: Treinamento
          - Operadores (30min cada)
          - Gerente (1h)
          - Testes com dinheiro fake

          Semana 4: Go-live
          - Ao vivo com suporte
          - Ajustes de operacao

          Total: 4 semanas

      - section_name: "Impacto Operacional (ROI)"
        purpose: "CFO/proprietario quer saber retorno"
        priority: "MEDIA"
        example_content: |
          Restaurante media (100 lugares, 4 caixas, 500 transacoes/dia):
          - Tempo por transacao: 5-10s vs 20-30s manual → velocidade 3-6x maior
          - Reducao de fila: 3-5 pessoas menos esperando
          - Menor erro: <1% (vs 5-10% manual)
          - Ticket medio: +10-20% (edicio facilitada, upsell)
          - Caixa segura: diferenca <R$10/dia (vs R$50-200/dia)
          - Reducao de papel: 90% menos

          Custo:
          - Hardware (tablet): R$ 1.500-2.500 (dura 3-5 anos)
          - Licenca/mes: R$ 200-500
          - Setup (1x): R$ 500-1.000

          ROI:
          - Break-even: 8-12 meses
          - Economia anual: R$ 10.000-15.000 (menos papel, menos erro, menos tempo)

      - section_name: "Objecoes e Respostas"
        purpose: "Vendedor tem argumentos estruturados"
        priority: "MEDIA"
        example_content: |
          Objecao: "Ja temos caixa. E muito mudanca."
          Resposta: Mudanca inicial de 1 mes. Depois, beneficio diario: menor erro,
          caixa fecha sempre, fiscal automatico. Investimento recuperado em 10 meses.

          Objecao: "Operador nao sabe usar tablet."
          Resposta: Interface trivial. 3 toques para vender. Treinamento 30min.
          Após 1 semana, operador e mais rapido que caixa mecanica.

          Objecao: "E se cair internet?"
          Resposta: Funciona offline! Dinheiro, cartao (via Bluetooth), tudo local.
          Quando volta internet, sincroniza com ERP. Zero perda de dados.

          Objecao: "Software brasileiro? Nao confio."
          Resposta: Nexuz existe desde 2019, 10.000+ usuarios, banco de dados brasileira,
          fiscal homologado. Mais seguro que sistema desatualizado.

      - section_name: "Treinamento e Suporte"
        purpose: "Apos venda, cliente sabe como operacionalizar"
        priority: "BAIXA"
        example_content: |
          Treinamento:
          - Video de 10min para operador novo
          - Chat ao vivo com tecnico em casos de duvida
          - Settings > Health Check para diagnosticar problemas
          - Atualiza automaticamente (OTA)

          Suporte:
          - WhatsApp 24/7 para erro de pagamento
          - Hotline 24/7 para operacao critica
          - SLA: resposta em 15min para critical, 1h para normal

      - section_name: "Chamada para Acao"
        purpose: "Fechar venda"
        priority: "MEDIA"
        example_content: |
          "PDV esta pronto para sua operacao. Proximos passos:
          1. Agende demo com gerente comercial
          2. Teste em 1 semana (sem custo)
          3. Se gostar, começa implementacao
          4. Em 4 semanas, PDV em produção

          Pronto para levar seu restaurante para proximo nivel?"

    missing_information_to_gather:

      - item: "Velocidade media de transacao por tipo de pagamento"
        source: "Codebase (medir em emulador ou dispositivo real)"
        why_needed: "Para ROI calculation e claim de 'velocidade 3-6x maior'"
        suggested_measurement: |
          Medir tempo de:
          - Dinheiro: abrir pagamento → calcular troco → finalizar
          - Cartao/PIX: selecionar → processamento → confirmacao
          - Divisao: adicionar primeira parcela → segunda parcela → finalizar

      - item: "Percentual medio de erro/problema por transacao"
        source: "Dados operacionais de clientes (pedir a equipe de vendas/CS)"
        why_needed: "Para claim de '<1% erro' vs 'manual 5-10%'"
        suggested_measurement: |
          Perguntar a 10 clientes Nexuz:
          - Quantas transacoes/mes?
          - Quantos erros/problemas de pagamento?
          - Quantas vezes caixa nao fecha? Por quê?

      - item: "Impacto em ticket medio (antes vs depois da implementacao)"
        source: "Dados operacionais de clientes"
        why_needed: "Para claim de '+10-20% ticket medio'"
        suggested_measurement: |
          Pedir a 5 clientes com PDV:
          - Ticket medio antes (mes 1-3)
          - Ticket medio depois (mes 7-9)
          - Causa (edicio de preco, upsell facilitado, etc)

      - item: "Tempo real de implementacao (4 semanas e exato?)"
        source: "Historico de projetos Nexuz"
        why_needed: "Para timeline ser realista"
        suggested_measurement: |
          Analisar ultimas 10 implementacoes:
          - Semana 1 (ERP setup): quantos dias?
          - Semana 2 (hardware): quantos dias?
          - Semana 3 (treinamento): quantos dias?
          - Semana 4 (go-live): quantos dias?
          - Total: media, min, max

      - item: "Custo total de implementacao (hardware + setup + licenses)"
        source: "Tabela de precos Nexuz + vendas historicas"
        why_needed: "Para ROI calculation"
        suggested_breakdown: |
          - Hardware tablet: modelo recomendado, preco
          - Licenca PDV/mes: Br? ERP?
          - Setup inicial: quanto custa?
          - Impressora fiscal: preco, necessaria?

      - item: "Segmentos de cliente ideal (que tipos de negocio usam PDV?)"
        source: "Analise de base de clientes Nexuz"
        why_needed: "Para foco em vendas"
        suggested_analysis: |
          Perguntar: dos clientes Nexuz, quantos usam PDV?
          - Restaurantes: X%
          - Pizzarias: Y%
          - Bares/Lanchonetes: Z%
          - Outros (qual?): W%

          Qual segmento tem maior satisfacao/NPS?

      - item: "Competidores diretos e posicionamento"
        source: "Pesquisa de mercado (Market Research)"
        why_needed: "Para diferenciacao claro"
        suggested_research: |
          Analisar:
          - Guarda (PDV desktop)
          - Pluggy (PDV cloud)
          - Getnet POS
          - RD Station (omnichannel)
          - Shopify POS (tablet)

          Para cada: preco, integracao, velocidade, offline, fiscal

