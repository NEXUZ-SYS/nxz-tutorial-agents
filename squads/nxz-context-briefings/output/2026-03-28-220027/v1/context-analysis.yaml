  # ======================================================================
  # PDV-SPECIFIC GAPS & OPPORTUNITIES
  # ======================================================================

  gaps_and_opportunities:

    gaps_specific_to_pdv_marketing_audience:

      - category: "Narrativa Comercial"
        description: |
          PDV nao tem narrativa clara de proposta de valor como o Totem tem.
          Totem: "Libera a equipe, elimina filas, aumenta ticket medio 400%"
          PDV: ??? - Falta narrativa equivalente orientada para caixa/gerente
        priority: "ALTA"
        why_important: "Vendedor precisa saber O QUE VENDER (proposta de valor) nao apenas O QUE E TECNICO"
        source: "Comparacao Totem briefing (v1.0) vs PDV context (disperso em arquivos tecnicos)"
        for_pdv_briefing: |
          Adicionar secao: "Proposta de Valor para PDV"
          - Agilidade: reduz tempo de transacao (PDV 5-10s vs manual 20-30s)
          - Controle de caixa: abertura/fechamento, extrato diario, rastreamento de vendedor
          - Flexibilidade: desconto, edicio de preco, multiplos pagamentos, divisao de conta
          - Seguranca: senha para pagamentos offline, auditoria via Odoo

      - category: "Exemplos de Caso de Uso"
        description: |
          PDV tem funcionalidades nao ilustradas com exemplos reais:
          - Controle de caixa (abertura/fechamento): quando/como usar?
          - Modo restaurante com mesas: que tipo de negocio usa? Como beneficia?
          - Divisao de conta: em que cenario cliente usa?
          - Desconto manual vs cupom: qual preferir?
          - Comanda aberta (paid later): quando gerente permite?
        priority: "ALTA"
        why_important: "Exemplos tornam features abstratas em problemas reais resolvidos"
        source: "Comparacao com Totem briefing que tem exemplo detalhado (Ana na cafeteria)"
        for_pdv_briefing: |
          Adicionar secao: "Exemplos de Caso de Uso"
          Exemplo 1 — Restaurante com 4 PDVs + cozinha
            - Cada caixa abre propia sessao, nao compartilha dinheiro
            - Gerente ve extrato por caixa ao final do dia
            - Se caixa A fecha com R$50 de diferenca, Odoo mostra exatamente qual transacao causou

          Exemplo 2 — Lanchonete de happy hour
            - Divisao de conta: 4 clientes, 1 mesa, pedidos separados
            - Caixa divide em 4 no final, cada um paga sua parte
            - Sistema calcula troco para cada pessoa

          Exemplo 3 — Pizzaria com mesas
            - Comanda aberta: cliente abre pedido mas paga depois
            - Garcom registra no PDV: mesa 5, pedido em aberto
            - Cliente agrega mais itens ao longo da noite
            - KDS ve pedido como "draft" e comeca a preparar
            - Ao final, caixa fecha comanda

      - category: "Segmentacao de Cliente"
        description: |
          PDV funcionalidades (mesas, comanda, divisao de conta) sao otimizadas para restaurante,
          mas nao existe contextualizacao de quando usar em outros formatos (lanchonete, food truck, pizzaria).
          Falta: qual tamanho de negocio? Quantas mesas? Quantos PDVs?
        priority: "ALTA"
        why_important: "Diferencia PDV de Totem e Smart POS. Precisa estar clara QUAL negocio compra PDV"
        source: "Analise de features (modo restaurante com mesas, comanda) vs falta de contexto de negocio"
        for_pdv_briefing: |
          Adicionar secao: "Quando Usar PDV"
          Ideal para:
          - Restaurantes de servico medio (30-100 lugares)
          - Pizzarias com entrega + balcao
          - Bares/lanchonetes com 2+ operadores de caixa
          - Food service com comanda aberta (pagar depois)
          Nao ideal para:
          - Fast food 100% takeaway (melhor usar Totem)
          - Food truck com 1 operador (melhor usar Smart POS)
          - Operacao muito pequena sem gerenciamento de caixa

      - category: "Comparacao com Concorrencia"
        description: |
          PDV nao menciona concorrentes (Guarda, Pluggy, Getnet POS, etc).
          Falta: qual a diferenca? Por que NXZ Go PDV e melhor?
        priority: "MEDIA"
        why_important: "Objecoes de vendedor: 'Por que nao usar sistema X que ja temos?'"
        source: "Falta de menucao em qualquer documento de contexto"
        for_pdv_briefing: |
          Adicionar secao: "Diferenciais vs Concorrencia"
          - Real-time com KDS: pedido chega na cozinha em 2s, nao ha delay
          - Whitelabel completo: marca do cliente em todo o app
          - Integrado com ERP: nao precisa de sync manual entre sistemas
          - Offline-first: funciona sem internet, sincroniza depois
          - Multi-pagador: 8+ provedores integrados

      - category: "Fluxo de Implementacao e Timeline"
        description: |
          Nenhum documento descreve tempo de projeto, treinamento, go-live.
          Falta: quanto tempo leva? Quem faz setup? Quanto custa?
        priority: "MEDIA"
        why_important: "Cliente quer saber: 'Quanto tempo demora ate usar?'"
        source: "Ausencia em toda documentacao"
        for_pdv_briefing: |
          Adicionar secao: "Implementacao"
          Timeline tipica:
          - Semana 1: Config no Odoo (catalogo, mesas, caixas, usuarios)
          - Semana 2: Setup de hardware e integracao com adquirentes
          - Semana 3: Treinamento da equipe (30min por operador)
          - Semana 4: Go-live com suporte
          Total: 4 semanas para restaurante medio

      - category: "Restricoes e Limitacoes"
        description: |
          PDV nao menciona limitacoes operacionais:
          - Quantos PDVs por estabelecimento?
          - Velocidade de transacao?
          - Quanto memoria consome em tablet?
          - Qual versao minima de Android?
          - Quais provedores de pagamento nao funcionam offline?
        priority: "MEDIA"
        why_important: "Implementador precisa saber restricoes antes de vender"
        source: "Ausencia em documentacao, deducivel apenas do codebase"
        for_pdv_briefing: |
          Adicionar secao: "Restricoes e Requisitos"
          - Minimo: Android 7 (API 24)
          - Recomendado: Tablet 7"+ (phone 5.5"+ funciona mas nao e ideal)
          - Pagamentos offline (dinheiro): senha requerida (regra de seguranca)
          - SAT/NFC-e: requer equipamento SAT local OU conexao com Odoo
          - Sem limite teorico de PDVs por loja, mas 10+ comeca a impactar rede

      - category: "Dados de Performance e ROI"
        description: |
          PDV nao menciona tempo de transacao, reducao de fila, impacto em ticket medio.
          Totem menciona: "Ticket medio sobe 400%" - PDV nao tem equivalente.
        priority: "MEDIA"
        why_important: "CFO/proprietario quer saber: 'Qual e o ROI?'"
        source: "Comparacao: Totem briefing (v1.0) tem "exemplo com numero", PDV nao tem"
        for_pdv_briefing: |
          Adicionar secao: "Impacto Operacional"
          Restaurante media (100 lugares, 4 caixas, 500 transacoes/dia):
          - Tempo por transacao: 5-10s (vs 20-30s manual)
          - Reducao de fila: 3-5 clientes menos esperando
          - Ticket medio: +10-20% (edicio de preco, upsell facilitado)
          - Reducao de erro: <1% de erro (vs 5-10% manual)
          - ROI: 8-12 meses (tipicamente)

      - category: "Treinamento e Suporte"
        description: |
          PDV nao menciona como treinar operadores ou SLA de suporte.
          Falta: quem treina? Quanto tempo? O que fazer em caso de problema?
        priority: "BAIXA"
        why_important: "Apos venda, cliente precisa de suporte"
        source: "Ausencia em documentacao"
        for_pdv_briefing: |
          Adicionar secao: "Treinamento e Suporte"
          - Video tutorial de 10min para operador novo
          - Hotline 24/7 para erros de pagamento
          - Health check do app: botao em Settings para diagnosticar problemas
          - Atualizacoes OTA: nao precisa ir a loja, atualiza sozinho

      - category: "Integracao com Ecossistema"
        description: |
          PDV documenta integracao com Odoo ERP, Firebase, SAT/NFC-e, pagamento.
          Falta contextualizacao: qual modulo do Odoo? Qual tabela? Qual documento fiscal?
          Para vendedor/marketing: como explica para cliente nao-tecnico que PDV depende de ERP?
        priority: "BAIXA"
        why_important: "Vendedor precisa saber: 'PDV sozinho nao funciona - precisa de Odoo'"
        source: "Documentacao tecnica, mas sem contexto comercial"
        for_pdv_briefing: |
          Adicionar secao: "Ecossistema Nexuz"
          NXZ Go PDV trabalha com:
          - NXZ ERP (obrigatorio): catalogo, usuarios, mesas, fiscal
          - NXZ KDS (opcional): display de cozinha para pedidos
          - NXZ Delivery (opcional): integra com iFood, Rappi, próprio sistema
          Vendedor pode vender "NXZ Go PDV" sozinho ou como parte de "NXZ Suite"

      - category: "Objections Handling"
        description: |
          PDV nao tem secao de objecoes tipicas.
          Falta: "Se cliente disser X, responda Y"
          Exemplos de objecoes: "Ja temos caixa registradora", "Sistema e muito caro",
          "Nao temos tablet", "Temos medo de software brasileiro", "E se cair internet?"
        priority: "MEDIA"
        why_important: "Vendedor precisa de argumentos estruturados para virar 'nao' em 'sim'"
        source: "Comparacao com Totem briefing (v1.0) que nao tem, mas e necessario"
        for_pdv_briefing: |
          Adicionar secao: "Objections & Respostas"
          Objecao: "Ja temos caixa registradora. Por que trocar?"
          Resposta: PDV oferece: controle de caixa digital, fiscal integrado, multiplos pagamentos,
          integrado com ERP, backup automatico. Caixa mecanica nao oferece nada disso.

          Objecao: "E se cair internet?"
          Resposta: PDV funciona offline. Caches pedidos localmente, sincroniza quando volta.

          Objecao: "Operador nao sabe usar tablet."
          Resposta: Interface trivial (3 toques para processar transacao). Treinamento 30min.

